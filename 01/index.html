<!DOCTYPE html> <!-- htmlの宣言をする前に文書型宣言をする -->
<html lang="ja"> <!-- 次に言語を指定する -->

<head> <!-- ←開始タグ 以下の終了タグまでの内容はコンテントと呼ぶ -->

  <meta charset="utf-8">
  <!-- 開始タグ・終了タグがない要素を空要素・Void要素と呼ぶ -->
  
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- <meta />とすることもできる -->

  <title>初めてのウェブページ</title>
  <!-- meta要素との兄弟関係 head要素と親子関係 -->
   
</head> <!-- ←終了タグ タグを含めて要素と呼ぶ (head要素)-->

<body>

  <h1>初めてのウェブページ</h1>
  <!-- 見出し(h1~h6要素) 大きさはh1が最も大きく、h6が最も小さいが、cssで調整可能 -->
  
  <p>これは私が<strong>初めて</strong>作った<mark>ウェブページ</mark>です。</p>
  <!-- タグを入れ子にすることをネストと呼ぶ -->
  <!-- タグで囲んだ範囲を1つの段落(p要素)という -->
  
  <p>→<a href="https://www.google.com/" target="_blank">Google</a>へ</p>
  <!-- a要素、hrefを使うとハイパーリンクを記述できる。 -->
  <!-- target="_blank"を指定すると新しいタブでページが開く -->

  <!-- 代表的要素→ a, strnong, mark, small, cite, del, ins, code, var, sub, sup -->
  <!-- 代表的空要素→ br, hr, img, input, link, meta -->

</body>

</html>
