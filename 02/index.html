<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>リストとテーブル</title>
</head>

<body>
  <ul>
    <li>いぬ</li>
    <li>さる</li>
    <li>きじ</li>
    <!-- 順序なしリストをul要素・li要素で表せる -->
  </ul>
  
    <ol>
        <li>いぬ</li>
        <li>さる</li>
        <li>きじ</li>
        <!-- 順序ありリストをol要素・li要素で表せる -->
    </ol>
</body>

</html>
